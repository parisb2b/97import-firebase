    <style>

    <h1>🔧 Firestore REST Debug</h1>

        const API_KEY = 'AIzaSyD07lt6roFD8zTbSFivLw2BUVKJVVUf8Lo';
        const PROJECT_ID = 'importok-6ef77';
        const logEl = document.getElementById('log');

        function log(msg, type = '') {
            const time = new Date().toLocaleTimeString();
            const span = document.createElement('span');
            span.className = type;
            span.textContent = `[${time}] ${msg}\n`;
            logEl.appendChild(span);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Test de connectivité basique
        async function testConnectivity() {
            logEl.innerHTML = '';
            log('🔍 Test de connectivité...', 'info');

            // Test Google
            try {
                log('  → Test google.com...');
                const t1 = Date.now();
                await fetch('https://www.google.com', { mode: 'no-cors' });
                log(`  ✅ Google OK (${Date.now() - t1}ms)`, 'success');
            } catch (e) {
                log(`  ❌ Google BLOQUÉ: ${e.message}`, 'error');
            }

            // Test Firebase Auth
            try {
                log('  → Test identitytoolkit.googleapis.com...');
                const t2 = Date.now();
                const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                log(`  ✅ Auth API accessible (${Date.now() - t2}ms)`, 'success');

                log(`  ❌ Auth API BLOQUÉ: ${e.message}`, 'error');
            }

            // Test Firestore
            try {
                log('  → Test firestore.googleapis.com...');
                const t3 = Date.now();
                const res = await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases`, {
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                log(`  ✅ Firestore API accessible (${Date.now() - t3}ms) - Status: ${res.status}`, 'success');
                if (data.error) {
                    log(`     → Réponse: ${data.error.message}`, 'info');
                }
            } catch (e) {
                log(`  ❌ Firestore API BLOQUÉ: ${e.message}`, 'error');

        }

        // Seed REST pur
        async function forceSeedRest() {
            const btn = document.getElementById('btnSeed');

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: "parisb2b@gmail.com",
                        password: "20262026",
                        returnSecureToken: true
                    })
                });

                if (!authRes.ok) {
                    const errData = await authRes.json();
                    throw new Error(`Auth failed: ${errData.error?.message || authRes.status}`);
                }

                const authData = await authRes.json();
                const token = authData.idToken;
                log(`✅ Authentifié en ${Date.now() - authStart}ms (UID: ${authData.localId})`, 'success');

                // 2. Test écriture simple
                log('\n📝 Étape 2: Écriture test dans Firestore...', 'info');

                const testData = {
                    fields: {
                        status: { stringValue: "REST_SUCCESS" },
                        timestamp: { stringValue: new Date().toISOString() },
                        test: { booleanValue: true }
                    }
                };

                const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/${encodeURIComponent('(default)')}/documents/admin_params/test_rest?key=${API_KEY}`;

                log(`  → URL: ${url.substring(0, 80)}...`);
                log('  → Envoi PATCH...');

                const writeStart = Date.now();
                const fireRes = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });

                const responseTime = Date.now() - writeStart;
                log(`  → Réponse reçue en ${responseTime}ms (Status: ${fireRes.status})`);

                if (fireRes.ok) {
                    const result = await fireRes.json();
                    log(`\n✨ SUCCÈS ! Document créé/mis à jour.`, 'success');
                    log(`  → Name: ${result.name}`, 'info');

                    // Si le test passe, lancer le seed complet
                    log('\n🌱 Le test a réussi ! Lancement du seed complet...', 'info');
                    await fullSeed(token);

                } else {
                    const errData = await fireRes.json();
                    log(`\n❌ ERREUR FIRESTORE (${fireRes.status}):`, 'error');
                    log(JSON.stringify(errData, null, 2), 'error');
                }

            } catch (e) {
                log(`\n💥 ERREUR: ${e.message}`, 'error');
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        // Seed complet
        async function fullSeed(token) {
            const baseUrl = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/${encodeURIComponent('(default)')}/documents`;

            async function writeDoc(collection, docId, data) {
                const url = `${baseUrl}/${collection}/${docId}?key=${API_KEY}`;
                const res = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fields: toFirestoreFields(data) })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(`${collection}/${docId}: ${err.error?.message || res.status}`);
                }
                return res.json();
            }

            function toFirestoreFields(obj) {
                const fields = {};
                for (const [k, v] of Object.entries(obj)) {
                    if (v === null || v === undefined) {
                        fields[k] = { nullValue: null };
                    } else if (typeof v === 'string') {
                        fields[k] = { stringValue: v };
                    } else if (typeof v === 'boolean') {
                        fields[k] = { booleanValue: v };
                    } else if (typeof v === 'number') {
                        fields[k] = Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
                    } else if (Array.isArray(v)) {
                        fields[k] = { arrayValue: { values: v.map(item => {
                            if (typeof item === 'string') return { stringValue: item };
                            if (typeof item === 'object') return { mapValue: { fields: toFirestoreFields(item) } };
                            return { stringValue: String(item) };
                        })}};
                    } else if (typeof v === 'object') {
                        fields[k] = { mapValue: { fields: toFirestoreFields(v) } };
                    }
                }
                return fields;
            }

            const now = new Date().toISOString();

                { id: 'client-marc-durand', email: 'marc.durand@gmail.com', nom: 'Marc Durand', tel: '+594 594 005 005', ville: 'Cayenne', territoire: 'Guyane', role: 'user' },
            ];
            for (const c of clients) {
                const { id, ...data } = c;
                await writeDoc('profiles', id, { ...data, createdAt: now });
                log(`  ✅ ${c.nom}`, 'success'); count++;
            }

            // Products
            log('\n📦 Produits...');
            const products = [
                { id: 'TEST-001', numero_interne: 'TEST-001', nom_fr: 'TEST Mini-pelle', categorie: 'mini-pelles', prix_achat_cny: 30000, prix_public_eur: 7672, actif: true },

            // Stock

            await writeDoc('stock', 'STK-001', { ref_piece: 'STK-001', nom: 'TEST Chenille caoutchouc', compatible: ['TEST-001'], qte: 2, seuil_alerte: 1, createdAt: now });

            log('  ✅ STK-003', 'success'); count++;

            // Partners
            log('\n🤝 Partenaires...');
            const partners = [
                { id: 'jm', nom: 'Jean-Marc Delacroix', code: 'JM', email: 'jm@partner.com', commission_taux: 15, actif: true },

    </script>
